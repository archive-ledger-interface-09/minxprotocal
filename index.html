<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ASTA Internal Archive</title>

<style>

body{
background:#0b0b0b;
color:#e6e6e6;
font-family:monospace;
margin:0;
overflow:hidden;
}

#topbar{
height:40px;
background:#111;
border-bottom:1px solid #333;
display:flex;
align-items:center;
padding-left:15px;
font-size:14px;
}

#container{
display:flex;
height:calc(100vh - 40px);
}

#sidebar{
width:260px;
background:#0f0f0f;
border-right:1px solid #333;
overflow-y:auto;
padding:10px;
}

#viewer{
flex:1;
padding:25px;
overflow-y:auto;
white-space:pre-wrap;
}

.file{
padding:6px;
cursor:pointer;
color:#bfbfbf;
}

.file:hover{
background:#1a1a1a;
color:white;
}

.section{
margin-top:15px;
color:#6efc7a;
font-size:12px;
letter-spacing:1px;
}

</style>
</head>

<body>

<div id="topbar">
ASTA INTERNAL ARCHIVE NODE
</div>

<div id="container">

<div id="sidebar"></div>

<div id="viewer">

Select a file from the directory.
</div>

</div>

const sidebar=document.getElementById("sidebar")
const viewer=document.getElementById("viewer")

function render(){

let categories={}

FILES.forEach(f=>{
if(!categories[f.category])categories[f.category]=[]
categories[f.category].push(f)
})

for(let c in categories){

let title=document.createElement("div")
title.className="section"
title.textContent=c.toUpperCase()
sidebar.appendChild(title)

categories[c].forEach(f=>{
let el=document.createElement("div")
el.className="file"
el.textContent=f.id
el.onclick=()=>viewer.textContent=f.content
sidebar.appendChild(el)
})

}

}

render()

</script>

</body>
</html>
